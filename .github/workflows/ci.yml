# Continuous integration for the Omytea Personal Future Console.
#
# Runs on every push + PR to main. Three jobs in matrix:
#   - test-suite (Python 3.11 + 3.12 + 3.13 on Ubuntu)
#   - build-native (PyInstaller one-folder bundle smoke build on macOS)
#   - lint-paper (markdown lint + sanity check on the arXiv draft)
#
# Cost discipline: all jobs use ubuntu-latest / macos-latest with the
# free public-repo minutes. No GPU runners. No cost.
#
# Mock mode (OMYTEA_CONSOLE_MOCK=1) keeps the suite hermetic — no
# external API calls, no Ollama dep. The vision-pipeline tests that
# need real LLMs are gated and skip cleanly in CI.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-suite:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run full test suite (mock mode — no LLM / no network)
        env:
          OMYTEA_CONSOLE_MOCK: '1'
        run: |
          python -m pytest -q --tb=short

      - name: Run eval harness
        env:
          OMYTEA_CONSOLE_MOCK: '1'
        run: |
          python -m eval.run_eval --json

  build-native:
    name: PyInstaller bundle smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Only run on push to main + manual dispatch to save minutes; PRs
    # get test-suite only.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: omytea-console-macos-arm64
          - os: ubuntu-latest
            artifact: omytea-console-linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install 'pyinstaller>=6.0,<7.0'

      - name: Install OpenCV runtime libs (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Build one-folder bundle
        run: bash scripts/build_native.sh --folder

      - name: Verify bundle binary exists
        run: |
          test -x dist/omytea-console/omytea-console || (
            echo "Bundle binary missing or not executable"
            exit 1
          )
          du -sh dist/omytea-console

      # Upload the bundle as a workflow artifact so it can be
      # downloaded from the Actions UI even before a release tag.
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/omytea-console
          retention-days: 14

  lint-paper:
    name: arXiv draft sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check paper draft is present + non-empty
        run: |
          test -f docs/papers/OMYTEA_VIDEO_CONSOLE_DRAFT.md
          # Must mention 'Lindblad' (it's literally the methodology core)
          grep -q "Lindblad" docs/papers/OMYTEA_VIDEO_CONSOLE_DRAFT.md
          # Must use 'correlated futures' framing per master plan §15 Rule #11
          grep -qi "correlated futures\\|classical correlation" \
            docs/papers/OMYTEA_VIDEO_CONSOLE_DRAFT.md
          # Should NOT make positive claims of literal entanglement.
          # Disclaimers ("not asserted", "not claimed", "without")
          # are explicitly tolerated. Use a python check so we can
          # treat the surrounding context properly rather than a
          # bare regex that false-positives on disclaimers.
          python3 - <<'PY'
          import re, sys, pathlib
          path = pathlib.Path("docs/papers/OMYTEA_VIDEO_CONSOLE_DRAFT.md")
          text = path.read_text(encoding="utf-8").lower()
          # Match affirmative claims like "achieves entanglement",
          # "demonstrates true entanglement", "the system exhibits
          # entanglement". Skip negated forms.
          bad_patterns = [
              r"\b(we|our (system|pipeline|console)|the (system|pipeline|console)) "
              r"(achieve[sd]?|demonstrate[sd]?|exhibit[sd]?|produce[sd]?|show[s]?) "
              r"(true |literal |genuine )?entanglement\b",
              r"\bachiev(es|ed|ing) (true |literal |genuine )?entanglement\b",
              r"\bdemonstrat(es|ed|ing) (true |literal |genuine )?entanglement\b",
              r"\bexhibit(s|ed|ing) (true |literal |genuine )?entanglement\b",
          ]
          hits = []
          for pat in bad_patterns:
              for m in re.finditer(pat, text):
                  # Window check: scan 50 chars before for a negator.
                  window = text[max(0, m.start() - 50):m.start()].lower()
                  if any(neg in window for neg in
                         ("not ", "no ", "without ", "n't ", "never ")):
                      continue
                  hits.append(m.group(0))
          if hits:
              print("Paper appears to make positive claims of literal entanglement:")
              for h in hits:
                  print(f"  - {h!r}")
              sys.exit(1)
          print("OK — no positive entanglement claims found.")
          PY
