# Streamlit Cloud config for Omytea Personal Future Console
# See https://docs.streamlit.io/library/advanced-features/configuration

[server]
# Headless on Cloud
headless = true
# Disable file watching on Cloud (we don't hot-reload)
fileWatcherType = "none"
# Bind on whatever port Streamlit Cloud injects
# (Streamlit Cloud sets STREAMLIT_SERVER_PORT env var; default 8501 locally)

[browser]
# Hide the "made with Streamlit" badge for a cleaner branded look
gatherUsageStats = false

[theme]
# Omytea Console v10 design language: dark-mode-first, minimal, scientific.
# Palette ported from marketing/console/Omytea Console v10 — see both at once.html.
base = "dark"
primaryColor = "#8b8cff"          # lavender accent (matches v10 --accent)
backgroundColor = "#0a0c11"        # v10 --canvas (very dark blue-grey, near-black)
secondaryBackgroundColor = "#11141b"  # v10 --surface (sidebar + container fills)
textColor = "#f0f2f5"              # v10 --ink-0 (brightest readable foreground)
font = "sans serif"

[client]
# Show toolbar so users can refresh / view source if curious
toolbarMode = "minimal"
showErrorDetails = false           # hide stack traces from public users in production
