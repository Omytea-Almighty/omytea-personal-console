# Streamlit Cloud config for Omytea Personal Future Console
# See https://docs.streamlit.io/library/advanced-features/configuration

[server]
# Headless on Cloud
headless = true
# Disable file watching on Cloud (we don't hot-reload)
fileWatcherType = "none"
# Serve omytea-personal-console/static/ at /app/static/<file>. This
# hosts the v10 live-video app (static/live_video_v10.html) as a real
# same-origin URL so it can be embedded in a top-document iframe (which
# CAN hold camera permission) instead of a permission-stripped
# components.html sandbox. See _heatmap_component.render_live_video_v10.
enableStaticServing = true
# Bind on whatever port Streamlit Cloud injects
# (Streamlit Cloud sets STREAMLIT_SERVER_PORT env var; default 8501 locally)

[browser]
# Hide the "made with Streamlit" badge for a cleaner branded look
gatherUsageStats = false

[theme]
# Omytea Console — Linear-grade dark theme.
# bug-035: the founder repeatedly flagged the UI as "toy-like" / "no
# visible change" despite many CSS commits. ROOT CAUSE was THIS block:
# Streamlit injects these values as authoritative CSS variables; custom
# <style> rules cannot override them without !important + sufficient
# specificity. Every previous "recolor" was patched over the theme,
# never re-rooting it. Retuned to Linear's documented palette so the
# theme is coherent at the source.
base = "dark"
primaryColor = "#5e6ad2"            # Linear lavender-blue (was #8b8cff bright lavender)
backgroundColor = "#08090a"          # Linear-grade near-black canvas (was #0a0c11)
secondaryBackgroundColor = "#0f1011"  # Linear surface-1 (was #11141b)
textColor = "#f7f8f8"                # Linear ink-0 (was #f0f2f5)
font = "sans serif"

[client]
# Show toolbar so users can refresh / view source if curious
toolbarMode = "minimal"
showErrorDetails = false           # hide stack traces from public users in production
